# Nginx configuration for Iris AI Tailscale reverse proxy
# Forwards traffic from Tailscale network to local backend

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream backends
    # Note: On Windows/Mac Docker, use host.docker.internal to reach host
    upstream iris_backend {
        server host.docker.internal:3001;
    }

    upstream media_dashboard_backend {
        server host.docker.internal:3000;
    }

    upstream media_dashboard_frontend {
        server host.docker.internal:3002;
    }

    # Iris AI Backend (port 3001)
    server {
        listen 3001;
        listen [::]:3001;

        server_name _;

        # Increase buffer sizes for large WebSocket messages
        client_max_body_size 100M;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # WebSocket endpoint
        location /ws {
            proxy_pass http://iris_backend/ws;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout (24 hours)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # Regular HTTP endpoints
        location / {
            proxy_pass http://iris_backend;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for regular requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://iris_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }
    }

    # Media Dashboard Backend API (port 3000)
    server {
        listen 3000;
        listen [::]:3000;

        server_name _;

        # Increase buffer sizes for API responses
        client_max_body_size 100M;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # All API endpoints
        location / {
            proxy_pass http://media_dashboard_backend;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for API requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # Media Dashboard Frontend (port 3002)
    server {
        listen 3002;
        listen [::]:3002;

        server_name _;

        # Frontend static files
        location / {
            proxy_pass http://media_dashboard_frontend;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable caching for static assets
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket support for HMR (Hot Module Replacement) if using dev server
        location /ws {
            proxy_pass http://media_dashboard_frontend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
